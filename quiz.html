<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学生クイズ - 手書き完成版</title>
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<div id="blackboard-frame">
    <div id="game-container">
        <div id="status-bar">
            <div id="lives">❤️❤️❤️</div>
            <div id="timer-text">10s</div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>

        <div id="quiz-screen">
            <div id="question-num"></div>
            <div id="question-text"></div>
            <div class="options" id="options"></div>
            
            <div id="rescue-wrapper">
                <button id="btn-rescue-trigger" onclick="openRescueMenu()">お助け機能</button>
            </div>

            <div id="rescue-modal" class="hidden-modal">
                <div id="rescue-modal-content">
                    <h3>どのお助け機能を使う？</h3>
                    <div id="rescue-options-grid">
                        <button id="btn-half" class="rescue-choice-btn" onclick="useHalfItem()">
                            <strong>1/2</strong><span>選択肢が2つに！</span>
                        </button>
                        <button id="btn-length" class="rescue-choice-btn" onclick="useLengthItem()">
                            <strong>文字数</strong><span>正解の文字数がわかる</span>
                        </button>
                        <button id="btn-pass" class="rescue-choice-btn" onclick="usePassItem()">
                            <strong>パス</strong><span>問題をやり直せる</span>
                        </button>
                    </div>
                    <button id="btn-rescue-close" onclick="closeRescueMenu()">戻る</button>
                </div>
            </div>
        </div>

        <div id="explanation-screen" class="hidden">
            <h2 id="exp-status"></h2>
            <div id="exp-text"></div>
            <button class="chalk-btn" onclick="nextQuestion()">次の問題へ</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="result-title">授業終了</h2>
            <p id="result-score" style="font-size: 24px;"></p>
            <button class="chalk-btn" onclick="location.reload()">もう一度挑戦</button>
        </div>

        <div id="feedback-overlay">
            <svg id="svg-feedback" viewBox="0 0 200 200">
                <circle id="draw-circle" cx="100" cy="100" r="70" />
                <g id="draw-cross">
                    <line x1="50" y1="50" x2="150" y2="150" />
                    <line x1="150" y1="50" x2="50" y2="150" />
                </g>
            </svg>
        </div>
    </div>
</div>

<script src="js/quiz.js"></script>
</body>
</html>
